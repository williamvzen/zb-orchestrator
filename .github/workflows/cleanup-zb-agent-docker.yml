# Cleans up Docker containers used for zb-agent on the runner (typically a
# self-hosted machine where agent workloads run in Docker). On GitHub-hosted
# runners this is usually a no-op.
name: Cleanup zb-agent Docker

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stop and remove zb-agent containers
        uses: ./.github/actions/cleanup-zb-agent-docker
