name: Cleanup zb-agent Docker containers
description: >
  Stops and removes all running Docker containers (docker ps -q, docker rm -f).
  Requires actions/checkout of this repository first so
  scripts/cleanup-zb-agent-docker.sh is available.

runs:
  using: composite
  steps:
    - name: Cleanup zb-agent containers
      shell: bash
      run: bash "${GITHUB_WORKSPACE}/scripts/cleanup-zb-agent-docker.sh"
